name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS release assets
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build release archives
        run: ./scripts/release.sh --version "${GITHUB_REF_NAME}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mole-${{ github.ref_name }}-macos
          path: dist/*

  build-windows:
    name: Build Windows release assets
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          "$env:GOPATH\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows executable
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -nsis -o Mole.exe

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $binDir = "build/bin"
          if (!(Test-Path $binDir)) {
            throw "Build output directory not found: $binDir"
          }
          Write-Host "== [debug] Recursive files under $binDir =="
          Get-ChildItem -Path $binDir -Recurse -File | Select-Object FullName,Name,Length | Format-Table -AutoSize

          $allCandidates = Get-ChildItem -Path $binDir -Recurse -File | Where-Object {
            $_.Extension -eq ".exe" -or $_.Name -ieq "Mole"
          }
          Write-Host "== [debug] Windows executable candidates =="
          $allCandidates | Select-Object FullName,Name,Length | Format-Table -AutoSize
          if ($allCandidates.Count -eq 0) {
            throw "No Windows executable candidate found under $binDir"
          }

          $portableExe = $allCandidates | Where-Object { $_.Name -notmatch 'installer|setup|uninstall' } | Select-Object -First 1
          if ($null -eq $portableExe) {
            $portableExe = $allCandidates | Select-Object -First 1
          }
          Write-Host "== [debug] Selected portable executable: $($portableExe.FullName)"

          $portableZip = "dist/Mole-${{ github.ref_name }}-windows-amd64.zip"
          Compress-Archive -Path $portableExe.FullName -DestinationPath $portableZip -Force
          Write-Host "== [debug] Portable zip created: $portableZip"

          $installerExe = $allCandidates | Where-Object { $_.Name -match 'installer|setup' } | Select-Object -First 1
          if ($null -ne $installerExe) {
            Copy-Item $installerExe.FullName "dist/$($installerExe.Name)" -Force
            Write-Host "== [debug] Installer copied: $($installerExe.FullName)"
          } else {
            Write-Host "== [debug] Installer candidate not found (this can be normal)"
          }

          $hashTargets = Get-ChildItem -Path dist -File | Where-Object { $_.Name -ne "SHA256SUMS-windows" }
          Write-Host "== [debug] Files included in SHA256 generation =="
          $hashTargets | Select-Object FullName,Name,Length | Format-Table -AutoSize
          $hashTargets | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Out-File -FilePath "dist/SHA256SUMS-windows" -Encoding ascii
          Write-Host "== [debug] Final files under dist =="
          Get-ChildItem -Path dist -File | Select-Object Name,Length | Format-Table -AutoSize

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mole-${{ github.ref_name }}-windows
          path: dist/*

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect release files
        run: |
          mkdir -p dist
          find release-assets -type f -maxdepth 3 -exec cp {} dist/ \;
          ls -lah dist

      - name: Publish assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${TAG_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" dist/* --clobber --repo "${GH_REPO}"
          else
            gh release create "${TAG_NAME}" dist/* \
              --repo "${GH_REPO}" \
              --title "${TAG_NAME}" \
              --generate-notes
          fi
